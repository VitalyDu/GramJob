name: Deploy

on:
  push:
    branches:
      - main

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'pnpm-lock.yaml'
            frontend:
              - 'frontend/**'
              - 'pnpm-lock.yaml'

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    steps:
      - name: Deploy to backend VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.BACKEND_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          timeout: 600s
          script: bash /opt/gramjob/deploy-backend.sh

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - name: Deploy to frontend VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.FRONTEND_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          timeout: 900s
          # Bump Node heap — Sentry webpack plugin adds noticeable memory pressure to `next build`
          script: NODE_OPTIONS='--max-old-space-size=2048' bash /opt/gramjob/deploy-frontend.sh
