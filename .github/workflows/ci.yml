name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier check
        run: pnpm exec prettier --check "**/*.{js,jsx,ts,tsx,json,md,yaml,yml,css}" --ignore-path .prettierignore

      - name: Lint (all workspaces)
        run: pnpm -r --if-present run lint

      - name: Type check (all workspaces)
        run: pnpm -r --if-present run typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gramjob
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: gramjob_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests (all workspaces)
        run: pnpm -r --if-present run test

      - name: Run integration tests (backend, requires postgres)
        run: pnpm --filter backend run test:integration
        env:
          DATABASE_CLIENT: postgres
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_NAME: gramjob_test
          DATABASE_USERNAME: gramjob
          DATABASE_PASSWORD: secret
          NODE_ENV: test
